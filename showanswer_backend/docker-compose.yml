version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: showanswer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    restart: always
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/showanswer
      PORT: 8002
    volumes:
      - .:/app
      - /app/node_modules
      # Mount parent QuestionScannerProject folder so Python script can resolve RapidOCR local model assets
      - ../QuestionScannerProject:/QuestionScannerProject
    depends_on:
      - db

volumes:
  pgdata:
